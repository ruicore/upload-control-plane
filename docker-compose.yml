services:
  api:
    build:
      context: .
    environment:
      APP_ENV: local
      APP_NAME: upload-control-plane
      API_CORS_ALLOWED_ORIGINS: ${API_CORS_ALLOWED_ORIGINS:-["http://localhost:5173"]}
      API_CORS_ALLOWED_METHODS: ${API_CORS_ALLOWED_METHODS:-["GET","POST","PATCH","DELETE","OPTIONS"]}
      API_CORS_ALLOWED_HEADERS: ${API_CORS_ALLOWED_HEADERS:-["authorization","content-type","idempotency-key","x-request-id"]}
      API_CORS_EXPOSE_HEADERS: ${API_CORS_EXPOSE_HEADERS:-["x-request-id"]}
      DATABASE_URL: postgresql+psycopg://upload:upload@postgres:5432/upload
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL:-http://localhost:19000}
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
      S3_BUCKET: robot-data
      S3_ADDRESSING_STYLE: path
    ports:
      - "${API_HOST_PORT:-18080}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: .
    command: ["uv", "run", "--no-sync", "python", "-m", "upload_control_plane.worker.main"]
    environment:
      APP_ENV: local
      APP_NAME: upload-control-plane
      DATABASE_URL: postgresql+psycopg://upload:upload@postgres:5432/upload
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL:-http://localhost:19000}
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
      S3_BUCKET: robot-data
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: upload
      POSTGRES_PASSWORD: upload
      POSTGRES_DB: upload
    ports:
      - "${POSTGRES_HOST_PORT:-25432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upload -d upload"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-http://localhost:5173,http://localhost:3000}
    ports:
      - "${MINIO_HOST_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-19001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/robot-data

volumes:
  postgres-data:
  minio-data:
